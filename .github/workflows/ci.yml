name: CI/CD Mail Reader Service

# Il workflow si avvia ad ogni push sul branch main o ad ogni Pull Request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22' # Usa la versione del tuo go.mod

    - name: Scarica dipendenze
      run: go mod download

    - name: Esegui Unit Tests (Veloci)
      run: go test -v ./...

    - name: Esegui Integration Tests (Mailosaur)
      # Passiamo i secrets di GitHub come variabili d'ambiente per il test
      env:
        MAILOSAUR_IMAP_HOST: ${{ secrets.MAILOSAUR_IMAP_HOST }}
        MAILOSAUR_SMTP_USER: ${{ secrets.MAILOSAUR_SMTP_USER }}
        MAILOSAUR_SMTP_PASSWORD: ${{ secrets.MAILOSAUR_SMTP_PASSWORD }}
      run: go test -v -tags=integration ./...

  # build-and-deploy:
  #   needs: test
  #   ... qui andranno i passi per pushare su GCR e deployare su Cloud Run