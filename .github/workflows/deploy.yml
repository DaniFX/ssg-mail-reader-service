name: Deploy Mail Reader Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: DaniFX/ssg-workflows/.github/workflows/cloudrun-deploy.yml@main
    with:
      service_name: ssg-mail-reader-service
      ingress_flag: "--ingress=internal"  # servizio privato
      env_vars: |
        ENV=production
        GATEWAY_URL=${{ secrets.GATEWAY_URL }}
        SERVICE_URL=${{ secrets.SERVICE_URL }}
        INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}
    secrets: inherit
