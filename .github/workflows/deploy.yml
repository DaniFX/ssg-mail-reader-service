name: Deploy Mail Reader Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: DaniFX/ssg-workflows/.github/workflows/cloudrun-deploy.yml@main
    with:
      service_name: ssg-mail-reader-service
      ingress_flag: "--ingress=internal"
    secrets: inherit
    # Secrets necessari nel repo:
    #   GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL
    #   GATEWAY_URL, SERVICE_URL, INTERNAL_SECRET
